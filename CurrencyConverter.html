<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" type = "text/css" href = "converter.css">
    <title>Currency Converter</title>
  </head>
  <body>
    <header><h1>Currency Converter</h1></header>
    <main>
        <div class = "container">
            <label for = "exchange" class = "exchange"><b>From:</b></label>
            <div>
                <select class = "dropdown">
                    <option class = "w">1</option>
                    <option>2</option>
                </select>
            </div>
            <label for = "exchange" class = "exchange2"><b>Amount:</b></label>
            <input class = "amount" type ="number" placeholder="Enter Amount">
            <label for = "exchange" class = "exchange3"><b>To:</b></label>
            <div>
                <select class = "dropdown2">
                    <option>1</option>
                    <option>2</option>
                </select>
            </div>
            <label for = "exchange" class = "exchange4"><b>Currency:</b></label>
            <div class = "value">1</div>
        </div>
    </main>
  </body>
</html>
